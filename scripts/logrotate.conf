# Rotate the agent's logs. Invoked from cron (no sudo needed — logrotate runs as the user
# with its own state file). Without this, ~/.paseo/daemon.log grows forever; it was already
# 6.3MB after two days.
/home/roman/.agent-logs/*.log {
    weekly
    rotate 6
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
/home/roman/.paseo/daemon.log {
    size 20M
    rotate 3
    compress
    missingok
    notifempty
    copytruncate
}
